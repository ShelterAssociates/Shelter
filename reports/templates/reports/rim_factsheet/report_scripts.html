{% load static %}
<script src="{% static 'admin/js/vendor/jquery/jquery.js' %}"></script>

<script>
	function switchReport(id, el) {
		document.querySelectorAll('.reports-tab').forEach(t => t.classList.remove('active'));
		document.querySelectorAll('.report-section').forEach(s => s.style.display = 'none');

		el.classList.add('active');
		document.getElementById(id).style.display = 'block';
	}
</script>

<script>
	let pdfAlreadyGenerated = false;
	let confirmRegenerate = false;

	$(document).ready(function () {

		// --------------------------------------------------
		// STATE
		// --------------------------------------------------
		let selectedSlumId = null;
		let isGenerating = false;

		// --------------------------------------------------
		// HELPERS
		// --------------------------------------------------
		function resetSelect(id, text) {
			$(id).html(`<option value="">${text}</option>`).prop('disabled', true);
		}

		function disableDownload() {
			$('#downloadBtn').prop('disabled', true).css('opacity', '0.5');
		}

		function enableDownload() {
			$('#downloadBtn').prop('disabled', false).css('opacity', '1');
		}

		disableDownload();

		// --------------------------------------------------
		// CITY
		// --------------------------------------------------
		$.get("{% url 'master:cityList' %}", function (data) {
			$.each(data.nameArray, function (i, name) {
				$('#city').append(`<option value="${data.idArray[i]}">${name}</option>`);
			});
		});

		$('#city').change(function () {
			resetSelect('#admin_ward', '--- Select Administrative Ward ---');
			resetSelect('#electoral_ward', '--- Select Electoral Ward ---');
			resetSelect('#slum', '--- Select Slum ---');
			$('#generate').prop('disabled', true);
			disableDownload();
		});

		// --------------------------------------------------
		// ADMIN WARD
		// --------------------------------------------------
		$('#city').change(function () {
			let id = $(this).val();
			if (!id) return;

			$.post("{% url 'master:administrativewardList' %}", {
				id: id,
				csrfmiddlewaretoken: '{{ csrf_token }}'
			}, function (data) {
				$('#admin_ward').prop('disabled', false);
				$.each(data.nameArray, function (i, name) {
					$('#admin_ward').append(`<option value="${data.idArray[i]}">${name}</option>`);
				});
			});
		});

		// --------------------------------------------------
		// ELECTORAL WARD
		// --------------------------------------------------
		$('#admin_ward').change(function () {
			let id = $(this).val();
			resetSelect('#electoral_ward', '--- Select Electoral Ward ---');
			resetSelect('#slum', '--- Select Slum ---');
			$('#generate').prop('disabled', true);
			disableDownload();

			if (!id) return;

			$.post("{% url 'master:electoralWardList' %}", {
				id: id,
				csrfmiddlewaretoken: '{{ csrf_token }}'
			}, function (data) {
				$('#electoral_ward').prop('disabled', false);
				$.each(data.nameArray, function (i, name) {
					$('#electoral_ward').append(`<option value="${data.idArray[i]}">${name}</option>`);
				});
			});
		});

		// --------------------------------------------------
		// SLUM
		// --------------------------------------------------
		$('#electoral_ward').change(function () {
			let id = $(this).val();
			resetSelect('#slum', '--- Select Slum ---');
			$('#generate').prop('disabled', true);
			disableDownload();

			if (!id) return;

			$.post("{% url 'master:slumList' %}", {
				id: id,
				csrfmiddlewaretoken: '{{ csrf_token }}'
			}, function (data) {
				$('#slum').prop('disabled', false);
				$.each(data.nameArray, function (i, name) {
					$('#slum').append(`<option value="${data.idArray[i]}">${name}</option>`);
				});
			});
		});

		$('#slum').change(function () {
			selectedSlumId = $(this).val();
			$('#generate').prop('disabled', !selectedSlumId);
			disableDownload();
		});

		// --------------------------------------------------
		// GENERATE PDF (SERVER SIDE)
		$('#generate').click(function () {

			if (!selectedSlumId || isGenerating) return;

			// 🔴 If download already enabled (PDF already generated)
			if ($('#download').prop('disabled') === false && !confirmRegenerate) {

				confirmRegenerate = true;

				// Show small warning near button instead of alert
				showButtonError("PDF already generated. Click again to refresh and regenerate.");

				// Reset confirmation after 4 seconds
				setTimeout(() => {
					confirmRegenerate = false;
				}, 4000);

				return; // Stop here — wait for second click
			}

			confirmRegenerate = false; // Reset confirmation

			isGenerating = true;
			$('#generate').prop('disabled', true).text('Generating...');
			disableDownload();

			const preview = $('#rim_preview');

			preview.html(`
        <div class="preview-placeholder">
            Generating preview...
        </div>
    `);

			/* 1️⃣ Load Preview */
			fetch(`/reports/preview-rim-factsheet/${selectedSlumId}/`)
				.then(res => res.text())
				.then(html => {
					preview.html(html);
				})
				.catch(err => {
					console.error(err);
					preview.html(`
                <div class="preview-placeholder">
                    Failed to load preview
                </div>
            `);
				});

			/* 2️⃣ Generate PDF */
			let forceGenerate = false;   // true = generate new, false = use cache

			fetch(`/reports/api/rim_factsheet_generation/${selectedSlumId}/?force_generate=${forceGenerate}`, {
				method: 'GET'
			})
				.then(res => {
					if (res.status === 405) {
						throw new Error('Please fill out the RIM form or sync the RIM data to generate the PDF.');
					} else if (res.status === 406) {
						throw new Error('Rapid Infrastructure Mapping data not found for this slum on app.Shelter');
					} else if (res.status !== 202) {
						throw new Error('PDF generation failed. Contact administrator.');
					}

					enableDownload();
				})
				.catch(err => {
					console.error(err);
					showButtonError(err.message);  // ✅ no alert
				})
				.finally(() => {
					$('#generate').prop('disabled', false).text('Generate RIM Report');
					isGenerating = false;
				});
		});




		// --------------------------------------------------
		// DOWNLOAD PDF (AUTO DOWNLOAD)
		// --------------------------------------------------
		$('#downloadBtn').click(function () {
			if (!selectedSlumId) return;

			window.location.href =
				`/reports/api/rim_factsheet_pdf_fetch/${selectedSlumId}/`;
		});

	});
</script>
