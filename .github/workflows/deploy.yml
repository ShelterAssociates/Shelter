name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:

      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      # ✅ Block migrations
      - name: Block migration files
        run: |
          MIGRATION_FILES=$(git diff --name-only HEAD~1 HEAD | grep '/migrations/[0-9]' || true)
          if [ -n "$MIGRATION_FILES" ]; then
            echo "❌ ERROR: Migration files detected:"
            echo "$MIGRATION_FILES"
            exit 1
          fi
          echo "✅ No migration files — safe to deploy."

      # ✅ Setup SSH (FORCED KEY USAGE)
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 🔥 Force SSH to use ONLY this key
          echo "Host *" > ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
          echo "  IdentitiesOnly yes" >> ~/.ssh/config

      # 🔍 Debug fingerprint (optional but useful)
      - name: Debug SSH key fingerprint
        run: |
          echo "Fingerprint from GitHub:"
          ssh-keygen -lf ~/.ssh/id_rsa

      # ✅ Add server to known hosts
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H -t rsa ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # 🔍 TEST SSH (MUST PASS)
      - name: Test SSH connection
        run: |
          ssh -vvv \
            -o StrictHostKeyChecking=no \
            -o PubkeyAcceptedKeyTypes=+ssh-rsa \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo ✅ SSH WORKS"

      # 🚀 RUN DEPLOY SCRIPT
      - name: Run deploy script
        run: |
          ssh -tt \
            -o StrictHostKeyChecking=no \
            -o PubkeyAcceptedKeyTypes=+ssh-rsa \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo RUNNING_SCRIPT && ls -l ~/deploy && bash -x ~/deploy/deploy.sh"