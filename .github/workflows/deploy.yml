name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      # 🔥 SETUP SSH (FINAL FIX)
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh

          # Decode key safely (no newline / echo issues)
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY_BASE64 }}" | base64 --decode > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

      # 🔍 VERIFY KEY (CRITICAL)
      - name: Verify key
        run: |
          echo "---- KEY START ----"
          head -n 2 ~/.ssh/id_rsa
          echo "---- KEY END ----"
          tail -n 2 ~/.ssh/id_rsa
          echo "---- FINGERPRINT ----"
          ssh-keygen -lf ~/.ssh/id_rsa

      # 🔥 FORCE SSH TO USE THIS KEY
      - name: Test SSH connection
        run: |
          ssh -vvv \
            -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o PubkeyAcceptedKeyTypes=+ssh-rsa \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo SSH_OK"

      # 🚀 DEPLOY
      - name: Run deploy script
        run: |
          ssh -tt \
            -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o PubkeyAcceptedKeyTypes=+ssh-rsa \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "bash -x ~/deploy/deploy.sh"