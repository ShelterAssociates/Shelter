name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Block migration files
        run: |
          MIGRATION_FILES=$(git diff --name-only HEAD~1 HEAD | grep '/migrations/[0-9]' || true)
          if [ -n "$MIGRATION_FILES" ]; then
            echo "❌ ERROR: Migration files detected:"
            echo "$MIGRATION_FILES"
            echo ""
            echo "Remove migration files from the live branch and push again."
            echo "Migrations are generated and applied on the server automatically."
            exit 1
          fi
          echo "✅ No migration files — safe to deploy."

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:           ${{ secrets.SERVER_HOST }}
          username:       ${{ secrets.SERVER_USER }}
          key:            ${{ secrets.SERVER_SSH_KEY }}
          port:           ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "──────────────────────────────────────────"
            echo "  Shelter WebApp — Production Deployment  "
            echo "──────────────────────────────────────────"

            echo "🐍 Activating environment..."
            source /srv/Shelter/ENV3/bin/activate

            echo "📦 Pulling latest code..."
            cd /srv/Shelter/
            git fetch origin
            git checkout master
            git pull origin master

            echo "🗄️  Running migrations..."
            python manage.py migrate --noinput

            echo "🗂️  Collecting static files..."
            python manage.py collectstatic --noinput

            echo "🔍 Running Django system checks..."
            python manage.py check

            echo "🔄 Restarting shelter service..."
            sudo systemctl restart shelter

            echo ""
            echo "✅ Deployment complete!"
            echo "──────────────────────────────────────────"